<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="style.css" />
  <script src="theme.js"></script>
</head>
<body>

  <h1>🏆 Clash of Clans Players</h1>

  <div id="loadingSpinner" class="spinner-container" style="display: none;">
    <div class="spinner"></div>
    <p>Connecting to Server...</p>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search name or tag..." autocomplete="off" />
    <select id="clanFilter">
      <option value="">All Clans</option>
    </select>
    <select id="leagueFilter">
      <option value="">All Leagues</option>
      <option value="Gold">Gold League</option>
      <option value="Crystal">Crystal League</option>
      <option value="Master">Master League</option>
      <option value="Champion">Champion League</option>
    </select>
    <select id="sortToggle">
      <option value="rank">Sort by Rank</option>
      <option value="name">Sort by Name</option>
      <option value="clan">Sort by Clan</option>
    </select>
    <button id="viewToggle" class="view-btn">🏆 Leaderboard</button>
    <button onclick="window.location.href='analytics.html'" class="view-btn">📊 Analytics</button>
    <button id="themeToggle" class="view-btn">☀️ Light Mode</button>
  </div>

  <div id="players-container"></div>

  <script src="script.js"></script>
</body>
</html>
